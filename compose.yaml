services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: judgebuddy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: judgebuddy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - judgebuddy-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d judgebuddy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  judgebuddy-postgres-data:
